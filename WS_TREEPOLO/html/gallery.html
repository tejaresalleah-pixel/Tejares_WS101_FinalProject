<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View photos of TREEPolo's venue, food, and events.">
    <title>Gallery | TREEPolo - Relax and Reconnect</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/webp" href="../webimages/treepolo_logo.webp">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-header {
            margin-top: 80px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('../webimages/background4.webp');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 6rem 2rem;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .gallery-filter {
            text-align: center;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background: transparent;
            border: 2px solid var(--light-green);
            color: var(--light-green);
            padding: 0.5rem 1.5rem;
            margin: 0 0.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--light-green);
            color: white;
        }
    </style>

</head>
<body>

    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <img src="../webimages/treepolo_logo.webp" alt="TREEPolo Logo">

            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="events.html">Services</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>

            <div class="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

                    <img src="../webimages/nacos.webp" alt="Loaded Nachos">

                        <i class="fas fa-search-plus"></i>
